<!-- Save as devops-animation.svg -->

<svg width="700" height="300" viewBox="0 0 700 300" xmlns="http://www.w3.org/2000/svg">

  <style>
    .bg {
      fill: #0d1117;
    }

    .infinity {
      fill: none;
      stroke: url(#grad);
      stroke-width: 18;
      stroke-linecap: round;
      stroke-dasharray: 30 20;
      animation: dash 4s linear infinite;
      filter: drop-shadow(0 0 12px #3b82f6);
    }

    .text {
      fill: white;
      font-size: 38px;
      font-family: Arial, sans-serif;
      font-weight: bold;
      letter-spacing: 3px;
    }

    .smallText {
      fill: #8b949e;
      font-size: 16px;
      font-family: Arial, sans-serif;
    }

    .icon {
      animation: float 3s ease-in-out infinite;
    }

    .icon2 {
      animation: float 4s ease-in-out infinite;
    }

    .icon3 {
      animation: float 5s ease-in-out infinite;
    }

    @keyframes dash {
      from {
        stroke-dashoffset: 0;
      }
      to {
        stroke-dashoffset: -100;
      }
    }

    @keyframes float {
      0% {
        transform: translateY(0px);
      }
      50% {
        transform: translateY(-8px);
      }
      100% {
        transform: translateY(0px);
      }
    }
  </style>

  <!-- Background -->
  <rect width="100%" height="100%" class="bg"/>

  <!-- Gradient -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Infinity Symbol -->
  <path
    class="infinity"
    d="
      M180 150
      C180 60, 350 60, 350 150
      C350 240, 520 240, 520 150
      C520 60, 350 60, 350 150
      C350 240, 180 240, 180 150
    "
  />

  <!-- DEV / OPS -->
  <text x="225" y="160" class="text">DEV</text>
  <text x="410" y="160" class="text">OPS</text>

  <!-- Subtitle -->
  <text x="210" y="250" class="smallText">
    Build • Automate • Deploy • Scale
  </text>

  <!-- Floating Icons -->
  <text x="120" y="80" class="icon" font-size="32">🐳</text>
  <text x="560" y="90" class="icon2" font-size="32">☁️</text>
  <text x="100" y="220" class="icon3" font-size="32">⚙️</text>
  <text x="580" y="220" class="icon" font-size="32">🚀</text>

</svg>
